aid: citymapper
name: Citymapper
description: >-
  Citymapper is a London-based urban transit and journey-planning company,
  founded in 2011, that operates a consumer mobile app for iOS and Android
  covering more than 80 cities worldwide. The app combines public transit
  (bus, rail, metro, tram, ferry), micromobility (bike share, scooter,
  e-bike), ride-hail, walking, and driving into multi-modal routes with
  real-time arrivals, disruption alerts, step-by-step navigation, fare
  comparisons, and journey-saving features such as Get Me Somewhere, Go,
  and Citymapper CLUB (its paid premium subscription). In March 2023
  Citymapper was acquired by Via Transportation, the New York-based
  TransitTech company that supplies on-demand transit, paratransit, and
  network-planning software to cities and transit agencies; Via integrates
  Citymapper as the rider-facing layer of its end-to-end transit platform
  alongside Remix (network planning) and Via's own on-demand operations
  software. Citymapper additionally offers a B2B advertising platform
  (ads.citymapper.com) targeting urban commuters. Citymapper previously
  published a self-service Directions API, a Navigation SDK (iOS, Android,
  Web), and Travel Time / Routing endpoints, but discontinued all
  self-serve developer products on 23 June 2023; remaining transit-data
  and routing integrations are now delivered under enterprise contracts
  through Via Transportation rather than via a public developer portal.
  There is no current public OpenAPI specification, self-serve API key,
  or open-access developer documentation for Citymapper.
